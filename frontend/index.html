<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangChain Starter Frontend</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f172a;
      --panel: #111827;
      --muted: #1f2937;
      --text: #e5e7eb;
      --subtle: #9ca3af;
      --user: #2563eb;
      --assistant: #374151;
      --border: #334155;
      --accent: #22c55e;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .app {
      width: min(900px, 100%);
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 15px 45px rgba(0, 0, 0, 0.35);
    }

    .header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(2, 6, 23, 0.7);
    }

    .title {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .subtitle {
      margin: 6px 0 0;
      font-size: 0.88rem;
      color: var(--subtle);
    }

    .controls {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 1fr;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.6);
    }

    .control {
      display: grid;
      gap: 6px;
    }

    .control label {
      font-size: 0.82rem;
      color: var(--subtle);
    }

    select,
    input[type="text"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #0b1220;
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.92rem;
    }

    .session-row {
      display: flex;
      gap: 8px;
    }

    .session-row input {
      flex: 1;
    }

    button {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.9rem;
      cursor: pointer;
      color: white;
      background: var(--muted);
    }

    button:hover {
      filter: brightness(1.08);
    }

    .btn-clear {
      background: var(--danger);
    }

    .agent-desc {
      padding: 8px 16px;
      font-size: 0.82rem;
      color: var(--subtle);
      border-bottom: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.4);
      min-height: 36px;
      display: flex;
      align-items: center;
    }

    .agent-desc .badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 6px;
      margin-right: 8px;
      text-transform: uppercase;
    }

    .badge.stateless { background: #1e3a5f; color: #60a5fa; }
    .badge.stateful  { background: #14532d; color: #4ade80; }
    .badge.async     { background: #4a1d6a; color: #c084fc; }

    .status {
      padding: 10px 16px;
      font-size: 0.84rem;
      color: var(--subtle);
      border-bottom: 1px solid var(--border);
    }

    .chat {
      height: 420px;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: rgba(2, 6, 23, 0.35);
    }

    .msg {
      max-width: 85%;
      padding: 10px 12px;
      border-radius: 12px;
      line-height: 1.35;
      white-space: pre-wrap;
      word-wrap: break-word;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }

    .msg.user {
      margin-left: auto;
      background: rgba(37, 99, 235, 0.95);
    }

    .msg.assistant {
      margin-right: auto;
      background: rgba(55, 65, 81, 0.95);
    }

    /* Intermediate steps — live streaming */
    .steps-container {
      margin-right: auto;
      max-width: 85%;
    }

    .steps-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--subtle);
      font-size: 0.78rem;
      padding: 4px 10px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 4px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .steps-toggle:hover {
      color: var(--text);
      border-color: var(--subtle);
      background: rgba(255,255,255,0.05);
    }

    .steps-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 6px 0;
    }

    .steps-list.collapsed {
      display: none;
    }

    .step {
      font-size: 0.8rem;
      padding: 8px 10px;
      border-radius: 8px;
      border-left: 3px solid;
      line-height: 1.3;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .step.tool_call {
      background: rgba(59, 130, 246, 0.1);
      border-left-color: #3b82f6;
      color: #93c5fd;
    }

    .step.tool_result {
      background: rgba(34, 197, 94, 0.1);
      border-left-color: #22c55e;
      color: #86efac;
    }

    .step.ai {
      background: rgba(168, 85, 247, 0.1);
      border-left-color: #a855f7;
      color: #d8b4fe;
    }

    .step-label {
      font-weight: 600;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 2px;
      opacity: 0.8;
    }

    .step-content {
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .step-input {
      margin-top: 4px;
      font-family: "SF Mono", Monaco, Consolas, monospace;
      font-size: 0.74rem;
      background: rgba(0,0,0,0.25);
      padding: 4px 6px;
      border-radius: 4px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .thinking-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--subtle);
      padding: 6px 0;
    }

    .thinking-indicator .dots span {
      animation: blink 1.4s infinite both;
      font-size: 1.1rem;
    }
    .thinking-indicator .dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-indicator .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }

    .composer {
      border-top: 1px solid var(--border);
      padding: 14px;
      display: flex;
      gap: 10px;
      background: rgba(15, 23, 42, 0.75);
    }

    .composer textarea {
      flex: 1;
      min-height: 52px;
      max-height: 180px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #0b1220;
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.95rem;
    }

    .composer button {
      min-width: 105px;
      background: var(--accent);
      color: #052e16;
      font-weight: 700;
    }

    .empty {
      color: var(--subtle);
      font-size: 0.92rem;
      text-align: center;
      margin-top: 35%;
    }

    @media (max-width: 720px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .chat {
        height: 55vh;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <h1 class="title">LangChain Starter Chat UI</h1>
      <p class="subtitle">Select an agent and start chatting. Thinking steps stream live.</p>
    </header>

    <section class="controls">
      <div class="control">
        <label for="mode">Agent</label>
        <select id="mode">
          <optgroup label="Starter Agents">
            <option value="tools">🔧 Tool Agent</option>
            <option value="memory">🧠 Memory Agent</option>
          </optgroup>
          <optgroup label="Lab Agents">
            <option value="simple">💬 Lab 1 — Simple Agent</option>
            <option value="lab-tools">🛠️ Lab 2 — Tool Agent</option>
            <option value="mcp-github">🐙 Lab 3 — MCP GitHub Agent</option>
            <option value="mcp-linear">📏 Lab 3 — MCP Linear Agent</option>
            <option value="middleware">🎯 Lab 4 — Middleware Agent</option>
            <option value="lab-memory">📝 Lab 5 — Memory Agent</option>
            <option value="postgres-airflow">🐘 Lab 6 — Postgres Airflow</option>
            <option value="deep-research">🔎 Lab 7 — Deep Research Agent</option>
          </optgroup>
        </select>
      </div>

      <div class="control">
        <label for="sessionId">Session ID <span id="sessionHint" style="font-style:italic">(for stateful agents)</span></label>
        <div class="session-row">
          <input id="sessionId" type="text" placeholder="Auto-generated on first message" />
          <button id="clearSession" class="btn-clear" type="button">Clear</button>
        </div>
      </div>
    </section>

    <div id="agentDesc" class="agent-desc">
      <span class="badge stateless">Stateless</span> Calculator, current time, and knowledge base tools.
    </div>

    <div id="status" class="status">Backend: http://localhost:8000</div>

    <section id="chat" class="chat">
      <div id="empty" class="empty">Send a message to start chatting.</div>
    </section>

    <form id="composer" class="composer">
      <textarea id="message" placeholder="Ask something..." required></textarea>
      <button id="sendBtn" type="submit">Send</button>
    </form>
  </main>

  <script>
    const API_BASE = "http://localhost:8000";

    const AGENTS = {
      "tools":             { stateful: false, badge: "stateless", desc: "Calculator, current time, and knowledge base tools.",                    placeholder: "What is sqrt(144) + 10?" },
      "memory":            { stateful: true,  badge: "stateful",  desc: "Conversational memory — remembers your session.",                        placeholder: "My name is Alice and I'm a data engineer." },
      "simple":            { stateful: false, badge: "stateless", desc: "Lab 1 — Just an LLM with a system prompt. No tools, no memory.",        placeholder: "Explain what Python is." },
      "lab-tools":         { stateful: false, badge: "stateless", desc: "Lab 2 — Calculator, weather, and string reversal tools.",               placeholder: "What's the weather in Tokyo? Also reverse 'LangChain'." },
      "mcp-github":        { stateful: false, badge: "async",     desc: "Lab 3 split — GitHub-only MCP agent. Requires GITHUB_TOKEN.",           placeholder: "List open pull requests for langchain-ai/langchain." },
      "mcp-linear":        { stateful: false, badge: "async",     desc: "Lab 3 split — Linear-only MCP agent. Requires LINEAR_API_KEY.",         placeholder: "List my current Linear issues assigned to me." },
      "middleware":        { stateful: false, badge: "stateless", desc: "Lab 4 — AI Engineering only! Profanity filter + topic guard. Off-topic = Wendy's 🍔", placeholder: "How do I fine-tune an LLM? (or try an off-topic question!)" },
      "lab-memory":        { stateful: true,  badge: "stateful",  desc: "Lab 5 — Memory + note-taking tools (save, get, list notes).",           placeholder: "Save a note: my favorite language is Python." },
      "postgres-airflow":  { stateful: false, badge: "stateless", desc: "Lab 6 — Inspects Postgres schemas and generates Airflow DAGs.",         placeholder: "List all tables and generate an Airflow DAG." },
      "deep-research":    { stateful: false, badge: "async",     desc: "Lab 7 — Web research + summarization + Supabase context storage.",       placeholder: "Research the latest OpenAI model updates and save context." },
    };

    const modeEl         = document.getElementById("mode");
    const sessionEl      = document.getElementById("sessionId");
    const sessionHintEl  = document.getElementById("sessionHint");
    const clearSessionBtn = document.getElementById("clearSession");
    const agentDescEl    = document.getElementById("agentDesc");
    const statusEl       = document.getElementById("status");
    const chatEl         = document.getElementById("chat");
    const emptyEl        = document.getElementById("empty");
    const composerEl     = document.getElementById("composer");
    const messageEl      = document.getElementById("message");
    const sendBtn        = document.getElementById("sendBtn");

    const state = {
      loading: false,
    };

    function currentAgent() {
      return AGENTS[modeEl.value];
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function updateAgentUI() {
      const agent = currentAgent();
      const badgeHtml = `<span class="badge ${agent.badge}">${agent.stateful ? "Stateful" : agent.badge === "async" ? "Async" : "Stateless"}</span>`;
      agentDescEl.innerHTML = badgeHtml + " " + agent.desc;
      messageEl.placeholder = agent.placeholder;

      sessionEl.disabled = !agent.stateful;
      sessionHintEl.textContent = agent.stateful ? "(for this agent)" : "(not used by this agent)";
      sessionEl.style.opacity = agent.stateful ? "1" : "0.4";
    }

    function scrollToBottom() {
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function addUserMessage(text) {
      emptyEl.style.display = "none";
      const div = document.createElement("div");
      div.className = "msg user";
      div.textContent = text;
      chatEl.appendChild(div);
      scrollToBottom();
    }

    function addAssistantMessage(text) {
      const div = document.createElement("div");
      div.className = "msg assistant";
      div.textContent = text;
      chatEl.appendChild(div);
      scrollToBottom();
      return div;
    }

    // Create a live steps container that steps are appended to as they stream in
    function createLiveStepsContainer() {
      const container = document.createElement("div");
      container.className = "steps-container";

      const toggle = document.createElement("button");
      toggle.className = "steps-toggle";
      toggle.innerHTML = "⚙️ Thinking... <span class='dots'><span>.</span><span>.</span><span>.</span></span>";
      toggle.dataset.count = "0";
      container.appendChild(toggle);

      const list = document.createElement("div");
      list.className = "steps-list";
      container.appendChild(list);

      let collapsed = false;
      toggle.addEventListener("click", () => {
        collapsed = !collapsed;
        list.classList.toggle("collapsed", collapsed);
        const count = parseInt(toggle.dataset.count);
        toggle.innerHTML = collapsed
          ? `⚙️ ${count} step${count !== 1 ? "s" : ""} ▸`
          : `⚙️ ${count} step${count !== 1 ? "s" : ""} ▾`;
      });

      chatEl.appendChild(container);
      scrollToBottom();

      return { container, toggle, list };
    }

    function appendStep(liveSteps, step) {
      const stepEl = document.createElement("div");
      stepEl.className = `step ${step.type}`;

      const label = document.createElement("div");
      label.className = "step-label";
      if (step.type === "tool_call") {
        label.textContent = `🔧 Tool Call: ${step.name || ""}`;
      } else if (step.type === "tool_result") {
        label.textContent = `✅ Result: ${step.name || ""}`;
      } else {
        label.textContent = "💭 Thinking";
      }
      stepEl.appendChild(label);

      const content = document.createElement("div");
      content.className = "step-content";
      content.textContent = step.content;
      stepEl.appendChild(content);

      if (step.tool_input) {
        const input = document.createElement("div");
        input.className = "step-input";
        input.textContent = step.tool_input;
        stepEl.appendChild(input);
      }

      liveSteps.list.appendChild(stepEl);

      const count = parseInt(liveSteps.toggle.dataset.count) + 1;
      liveSteps.toggle.dataset.count = String(count);
      liveSteps.toggle.innerHTML = `⚙️ ${count} step${count !== 1 ? "s" : ""} ▾`;

      scrollToBottom();
    }

    function finalizeLiveSteps(liveSteps) {
      const count = parseInt(liveSteps.toggle.dataset.count);
      if (count === 0) {
        liveSteps.container.remove();
        return;
      }
      // Collapse by default after completion
      liveSteps.list.classList.add("collapsed");
      liveSteps.toggle.innerHTML = `⚙️ ${count} step${count !== 1 ? "s" : ""} ▸`;
    }

    function setLoading(isLoading) {
      state.loading = isLoading;
      sendBtn.disabled = isLoading;
      sendBtn.textContent = isLoading ? "Thinking..." : "Send";
      modeEl.disabled = isLoading;
    }

    // Parse SSE from a ReadableStream
    async function* parseSSE(response) {
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });

        // Process complete SSE messages (separated by double newline)
        const parts = buffer.split("\n\n");
        buffer = parts.pop(); // Keep incomplete part in buffer

        for (const part of parts) {
          if (!part.trim()) continue;

          let eventType = "message";
          let data = "";

          for (const line of part.split("\n")) {
            if (line.startsWith("event: ")) {
              eventType = line.slice(7);
            } else if (line.startsWith("data: ")) {
              data = line.slice(6);
            }
          }

          if (data) {
            try {
              yield { event: eventType, data: JSON.parse(data) };
            } catch (e) {
              console.warn("SSE parse error:", e, data);
            }
          }
        }
      }
    }

    async function sendMessageStreaming(text) {
      const mode = modeEl.value;
      const agent = currentAgent();
      const payload = { message: text };

      if (agent.stateful && sessionEl.value.trim()) {
        payload.session_id = sessionEl.value.trim();
      }

      setStatus(`Streaming from /chat/stream?mode=${mode}...`);

      const response = await fetch(`${API_BASE}/chat/stream?mode=${mode}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      if (!response.ok) {
        const errText = await response.text();
        throw new Error(`HTTP ${response.status}: ${errText}`);
      }

      // Create live steps container
      const liveSteps = createLiveStepsContainer();
      let stepCount = 0;

      for await (const { event, data } of parseSSE(response)) {
        if (event === "step") {
          appendStep(liveSteps, data);
          stepCount++;
          setStatus(`Thinking... (${stepCount} step${stepCount !== 1 ? "s" : ""})`);
        } else if (event === "done") {
          finalizeLiveSteps(liveSteps);
          addAssistantMessage(data.response || "(No response)");

          if (agent.stateful && data.session_id && !sessionEl.value.trim()) {
            sessionEl.value = data.session_id;
          }

          const sid = data.session_id ? ` | session_id: ${data.session_id}` : "";
          setStatus(`Done — ${stepCount} steps${sid}`);
        } else if (event === "error") {
          finalizeLiveSteps(liveSteps);
          addAssistantMessage(`Error: ${data.message}`);
          setStatus("Agent error. See steps for details.");
        }
      }
    }

    composerEl.addEventListener("submit", async (event) => {
      event.preventDefault();
      const text = messageEl.value.trim();
      if (!text || state.loading) return;

      addUserMessage(text);
      messageEl.value = "";
      messageEl.focus();
      setLoading(true);

      try {
        await sendMessageStreaming(text);
      } catch (error) {
        addAssistantMessage(`Error: ${error.message}`);
        setStatus("Request failed. Check backend logs and CORS.");
      } finally {
        setLoading(false);
      }
    });

    clearSessionBtn.addEventListener("click", () => {
      sessionEl.value = "";
      chatEl.querySelectorAll(".msg, .steps-container").forEach(n => n.remove());
      emptyEl.style.display = "block";
      setStatus("Session cleared.");
    });

    modeEl.addEventListener("change", () => {
      updateAgentUI();
      chatEl.querySelectorAll(".msg, .steps-container").forEach(n => n.remove());
      emptyEl.style.display = "block";
      setStatus(`Switched to: ${modeEl.options[modeEl.selectedIndex].text}`);
    });

    // Init
    updateAgentUI();
  </script>
</body>
</html>
